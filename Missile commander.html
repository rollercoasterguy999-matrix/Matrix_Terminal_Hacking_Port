<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix_Missile_Command.exe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #010402;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 3.5vh;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #00ff41;
            text-align: center;
        }

        #game-container {
            position: relative;
            border: 2px solid #00ff41;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.25);
            background: #000;
            max-height: 80vh;
            max-width: 95vw;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        canvas {
            display: block;
            max-height: 80vh;
            max-width: 100%;
            object-fit: contain;
        }

        /* CRT Scanline Overlay */
        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 2;
            background-size: 100% 4px;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            z-index: 5;
            text-shadow: 0 0 5px #000;
        }

        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
        }

        .overlay-title {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }
        
        .overlay-title.start { color: #00ff41; text-shadow: 0 0 15px #00ff41; }
        .overlay-title.over { color: #ff3333; text-shadow: 0 0 15px #ff3333; }

        .overlay-sub {
            font-size: 13px;
            color: #ffffff;
            opacity: 0.8;
            text-align: center;
            line-height: 1.6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>[ MAINFRAME_DEFENSE.SYS ]</h1>

    <div id="game-container">
        <canvas id="missileCanvas" width="640" height="480"></canvas>
        
        <div id="ui-layer">
            <span id="score-display">ATTACKS_INTERCEPTED: 0</span>
        </div>

        <div id="screen-overlay" onclick="startGame()">
            <div id="overlay-main-text" class="overlay-title start">ENGAGE_FIREWALL_MATRIX</div>
            <div id="overlay-sub-text" class="overlay-sub">
                CLICK ANYWHERE to Deploy Defensive Patches<br>
                Intercept Incoming Corruption Streams. Defend the Core Servers.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('missileCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = "START";
        let score = 0;
        let animationFrameId = null;

        // Base targets tracking array
        let servers = [];
        let incomingMissiles = [];
        let defensiveExplosions = [];

        let spawnRate = 0.015; // Probability threshold per frame step
        let threatSpeed = 0.8;

        // Background digital matrix rain streams
        let matrixDrops = [];
        const chars = "0123456789日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱ";
        for (let i = 0; i < 22; i++) {
            matrixDrops.push({ x: i * 30, y: Math.random() * canvas.height, speed: Math.random() * 1.5 + 0.5 });
        }

        // Mouse click target mapping link
        canvas.addEventListener('click', (e) => {
            if (gameState !== "PLAYING") return;

            // Compute click positioning factoring bounding scaling transforms
            const rect = canvas.getBoundingClientRect();
            const targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const targetY = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Directly initialize defense blast ripple at coordinates
            defensiveExplosions.push({
                x: targetX,
                y: targetY,
                radius: 1,
                maxRadius: 45,
                growthSpeed: 1.5,
                state: "GROWING" // "GROWING" or "SHRINKING"
            });
        });

        function startGame() {
            if (gameState === "START" || gameState === "GAMEOVER") {
                score = 0;
                spawnRate = 0.015;
                threatSpeed = 0.8;
                incomingMissiles = [];
                defensiveExplosions = [];
                document.getElementById('score-display').innerText = `ATTACKS_INTERCEPTED: ${score}`;

                // Setup 3 Host Servers Node metrics
                servers = [
                    { x: 120, active: true, label: "SERVER_A" },
                    { x: 320, active: true, label: "SERVER_B" },
                    { x: 520, active: true, label: "SERVER_C" }
                ];

                gameState = "PLAYING";
                document.getElementById('screen-overlay').classList.add('hidden');
                loop();
            }
        }

        function createThreatStream() {
            // Find an active server target
            let activeServers = servers.filter(s => s.active);
            if (activeServers.length === 0) return;

            let targetServer = activeServers[Math.floor(Math.random() * activeServers.length)];
            
            incomingMissiles.push({
                startX: Math.random() * canvas.width,
                startY: 0,
                x: Math.random() * canvas.width,
                y: 0,
                targetX: targetServer.x,
                targetY: canvas.height - 30,
                speed: threatSpeed + Math.random() * 0.5,
                progress: 0,
                bitCode: Math.random() > 0.5 ? "1" : "0"
            });
        }

        function triggerGameOver() {
            gameState = "GAMEOVER";
            cancelAnimationFrame(animationFrameId);
            
            const title = document.getElementById('overlay-main-text');
            const sub = document.getElementById('overlay-sub-text');

            title.innerText = "TOTAL_SYSTEM_PURGE.ERR";
            title.className = "overlay-title over";
            sub.innerHTML = `ALL CORE ARCHITECTURES CORRUPTED.<br>INTERCEPTED ATTACKS: ${score}<br>CLICK TO INJECT RE-DEPLOY LATCH`;
            document.getElementById('screen-overlay').classList.remove('hidden');
        }

        // Logic framework process physics updates
        function update() {
            // Animate backgrounds codes
            for (let drop of matrixDrops) {
                drop.y += drop.speed;
                if (drop.y > canvas.height) drop.y = -20;
            }

            if (gameState !== "PLAYING") return;

            // Dynamic escalation logic increments
            if (Math.random() < spawnRate) {
                createThreatStream();
            }
            // Slowly increase difficulty scaling parameters
            spawnRate += 0.000005;
            threatSpeed += 0.0001;

            // 1. Progress Incoming Malicious Missiles Channels
            for (let i = incomingMissiles.length - 1; i >= 0; i--) {
                let m = incomingMissiles[i];
                
                // Track vector calculation steps linearly
                let dx = m.targetX - m.startX;
                let dy = m.targetY - m.startY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                m.progress += m.speed;
                let ratio = m.progress / dist;

                m.x = m.startX + dx * ratio;
                m.y = m.startY + dy * ratio;

                // Hit target baseline terminal sector boundary condition checks
                if (ratio >= 1.0) {
                    // Explode on server node proximity hit-tests
                    let targetNode = servers.find(s => s.x === m.targetX);
                    if (targetNode) targetNode.active = false;

                    incomingMissiles.splice(i, 1);

                    // Check if absolute critical baseline is broken
                    if (!servers.some(s => s.active)) {
                        triggerGameOver();
                        return;
                    }
                }
            }

            // 2. Expand/Contract Passive Anti-virus Defensive Pulse Ripples
            for (let i = defensiveExplosions.length - 1; i >= 0; i--) {
                let e = defensiveExplosions[i];
                if (e.state === "GROWING") {
                    e.radius += e.growthSpeed;
                    if (e.radius >= e.maxRadius) e.state = "SHRINKING";
                } else {
                    e.radius -= e.growthSpeed * 0.8;
                    if (e.radius <= 0) {
                        defensiveExplosions.splice(i, 1);
                    }
                }
            }

            // 3. Collision Logic Proxies (Explosions vs Threat Missiles)
            for (let i = incomingMissiles.length - 1; i >= 0; i--) {
                let m = incomingMissiles[i];
                for (let exp of defensiveExplosions) {
                    let distance = Math.sqrt(Math.pow(m.x - exp.x, 2) + Math.pow(m.y - exp.y, 2));
                    if (distance <= exp.radius) {
                        // Threat nullified successfully
                        incomingMissiles.splice(i, 1);
                        score += 10;
                        document.getElementById('score-display').innerText = `ATTACKS_INTERCEPTED: ${score}`;
                        break;
                    }
                }
            }
        }

        // Master Layout Graphic Canvas Core Paint
        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Matrix background stream codes rendering
            ctx.fillStyle = 'rgba(0, 255, 65, 0.04)';
            ctx.font = '14px monospace';
            for (let drop of matrixDrops) {
                let char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(char, drop.x, drop.y);
            }

            // Draw Incoming Destruction Code Lines
            for (let m of incomingMissiles) {
                ctx.strokeStyle = 'rgba(255, 51, 51, 0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(m.startX, m.startY);
                ctx.lineTo(m.x, m.y);
                ctx.stroke();

                // Leading tracer threat point marker element
                ctx.fillStyle = '#ff3333';
                ctx.font = 'bold 12px monospace';
                ctx.fillText(m.bitCode, m.x - 4, m.y + 4);
            }

            // Draw Anti-virus Defenses Blast Rings
            for (let exp of defensiveExplosions) {
                ctx.strokeStyle = '#00ff41';
                ctx.fillStyle = 'rgba(0, 255, 65, 0.12)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff41';

                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Tiny internal core notation detail string
                if (exp.radius > 15) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#00ff41';
                    ctx.font = '8px monospace';
                    ctx.fillText("PATCH.OK", exp.x - 18, exp.y + 3);
                }
            }
            ctx.shadowBlur = 0;

            // Draw Server Core Hub Base Modules
            ctx.lineWidth = 2;
            for (let s of servers) {
                if (s.active) {
                    ctx.fillStyle = '#000000';
                    ctx.strokeStyle = '#00ff41';
                    ctx.fillRect(s.x - 40, canvas.height - 35, 80, 25);
                    ctx.strokeRect(s.x - 40, canvas.height - 35, 80, 25);

                    ctx.fillStyle = '#00ff41';
                    ctx.font = 'bold 10px monospace';
                    ctx.fillText(`[${s.label}]`, s.x - 26, canvas.height - 19);
                } else {
                    // Offline Corrupted State Display metrics
                    ctx.fillStyle = '#100202';
                    ctx.strokeStyle = '#ff3333';
                    ctx.fillRect(s.x - 40, canvas.height - 35, 80, 25);
                    ctx.strokeRect(s.x - 40, canvas.height - 35, 80, 25);

                    ctx.fillStyle = '#ff3333';
                    ctx.font = 'bold 10px monospace';
                    ctx.fillText("[OVR_RID]", s.x - 26, canvas.height - 19);
                }
            }

            // Draw lower connection grid grounding link bar line
            ctx.strokeStyle = '#00ff41';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 10);
            ctx.lineTo(canvas.width, canvas.height - 10);
            ctx.stroke();
        }

        function loop() {
            update();
            draw();
            animationFrameId = requestAnimationFrame(loop);
        }

        // Draw structural skeleton background layout frame static initialization mapping
        draw();
    </script>
</body>
</html>
